<script>
var c=document.getElementById('canvas'),x=c.getContext('2d'),W,H,stars=[],cZ=0,cP=0,aP=0,aA=false,dn=false;
var SC=1800,LC=500,FD=4000,SP=1500,DP=3000;
function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
addEventListener('resize',resize);resize();
function Star(x,y,z,tx,ty){this.x=x;this.y=y;this.z=z;this.tx=tx;this.ty=ty;this.rx=x;this.ry=y;this.rz=z;this.sz=.5+Math.random()*2;this.br=.3+Math.random()*.7;this.ts=.5+Math.random()*2;this.to=Math.random()*Math.PI*2;this.il=tx!==undefined}
function getLogoPoints(count){
  var svg=document.getElementById('logoSvg');
  var vb=svg.getAttribute('viewBox').split(/[\s,]+/).map(Number);
  var off=document.createElement('canvas');off.width=500;off.height=500;
  var oc=off.getContext('2d');oc.clearRect(0,0,500,500);oc.save();
  oc.scale(500/vb[2],500/vb[3]);
  var paths=svg.querySelectorAll('path');
  for(var i=0;i<paths.length;i++){try{oc.fill(new Path2D(paths[i].getAttribute('d')))}catch(e){}}
  oc.restore();
  var id=oc.getImageData(0,0,500,500);var filled=new Uint8Array(500*500);
  for(var y=0;y<500;y++)for(var xx=0;xx<500;xx++)if(id.data[(y*500+xx)*4+3]>64)filled[y*500+xx]=1;
  var edge=[],fill=[];
  for(var y=1;y<499;y+=2)for(var xx=1;xx<499;xx+=2){
    if(!filled[y*500+xx])continue;
    var isE=!filled[(y-1)*500+xx]||!filled[(y+1)*500+xx]||!filled[y*500+xx-1]||!filled[y*500+xx+1];
    var px=(xx-250)*.5,py=(y-250)*.5;
    if(isE)edge.push({x:px,y:py});else fill.push({x:px,y:py})
  }
  var result=[],eC=Math.floor(count*.8),fC=count-eC;
  var eS=Math.max(1,Math.floor(edge.length/eC));
  for(var i=0;i<edge.length&&result.length<eC;i+=eS)result.push(edge[i]);
  var fS=Math.max(1,Math.floor(fill.length/fC));
  for(var i=0;i<fill.length&&result.length<count;i+=fS)result.push(fill[i]);
  while(result.length<count)result.push(edge[Math.floor(Math.random()*edge.length)]);
  return result.slice(0,count)
}
function init(){stars=[];var lp=getLogoPoints(LC);for(var i=0;i<LC;i++){var p=lp[i];stars.push(new Star((Math.random()-.5)*SP,(Math.random()-.5)*SP,Math.random()*DP,p.x,p.y))}for(var i=0;i<SC-LC;i++)stars.push(new Star((Math.random()-.5)*SP*2,(Math.random()-.5)*SP*2,Math.random()*DP))}
function fly(){if(aA)return;aA=true;aP=0;cP=0;var st=performance.now();!function ft(){var el=performance.now()-st;cP=Math.min(1,el/FD);cZ=-DP*(1-cP);var m=.4;aP=cP>=m?Math.min(1,(cP-m)/(1-m)):0;document.getElementById('progress').style.width=(cP*100)+'%';if(cP<1)requestAnimationFrame(ft);else{aP=1;dn=true;aA=false;setTimeout(function(){document.getElementById('title').classList.add('show');document.getElementById('subtitle').classList.add('show')},300)}}(requestAnimationFrame(fly))}
c.addEventListener('click',function(){if(!dn)fly()});
var raf=null,lt=0;
function tick(t){if(!raf)return;var d=Math.min(t-lt,50);lt=t;var f=600,tm=t/1000;x.clearRect(0,0,W,H);var g=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);g.addColorStop(0,'#0a0a12');g.addColorStop(1,'#000');x.fillStyle=g;x.fillRect(0,0,W,H);
var s=stars.map(function(s){if(s.il){var tt=aP;s.rx=s.x+(s.tx-s.x)*tt;s.ry=s.y+(s.ty-s.y)*tt;s.rz=s.z+(0-s.z)*tt+cZ}else{s.rx=s.x;s.ry=s.y;s.rz=s.z+cZ}return s}).sort(function(a,b){return b.rz-a.rz});
for(var i=0;i<s.length;i++){var st=s[i],z=st.rz;if(z<-f+100)continue;var sc=f/(f+z),sx=W/2+(st.rx)*sc,sy=H/2+(st.ry)*sc;if(sx<-50||sx>W+50||sy<-50||sy>H+50)continue;var tw=.5+.5*Math.sin(tm*st.ts+st.to);var al=st.br*tw*sc;if(st.il&&aP>.3)al=Math.max(al,((aP-.3)/.7)*sc);var sz=st.sz*sc;if(st.il&&aP>.5){var hu=200+(st.tx/150)*140;x.fillStyle='hsla('+hu+',80%,75%,'+Math.min(1,al)+')'}else x.fillStyle='rgba(200,210,240,'+Math.min(1,al)+')';x.beginPath();x.arc(sx,sy,Math.max(.5,sz),0,Math.PI*2);x.fill()}
if(aP>.6){var la=(aP-.6)/.4*.15;x.strokeStyle='rgba(168,216,240,'+la+')';x.lineWidth=.5;var ls=s.filter(function(s){return s.il&&s.rz>-f+100});for(var i=0;i<ls.length;i++){var a=ls[i],ax=W/2+(a.rx)*(f/(f+a.rz)),ay=H/2+(a.ry)*(f/(f+a.rz));for(var j=i+1;j<Math.min(i+8,ls.length);j++){var b=ls[j],bx=W/2+(b.rx)*(f/(f+b.rz)),by=H/2+(b.ry)*(f/(f+b.rz));if(Math.hypot(ax-bx,ay-by)<40){x.beginPath();x.moveTo(ax,ay);x.lineTo(bx,by);x.stroke()}}}}
raf=requestAnimationFrame(tick)}
init();raf=requestAnimationFrame(tick);fly();
</script>
